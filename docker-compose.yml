services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

  weather-alpha:
    build:
      context: .
      dockerfile: weather_alpha/Dockerfile
    container_name: weather-alpha
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./weather_alpha/data:/app/weather_alpha/data_volume
    environment:
      WEATHER_ALPHA_DB_PATH: /app/weather_alpha/data_volume/data.sqlite
