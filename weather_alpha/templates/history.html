<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Weather Alpha — History</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#0b0f14; --fg:#e6edf3; --mut:#8b95a7; --acc:#ffd166; --ok:#4ade80; --bad:#f87171; --panel:#131a22; --br:#1f2833; }
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.45 ui-sans-serif,system-ui,sans-serif;}
  nav{display:flex;gap:18px;padding:14px 22px;border-bottom:1px solid var(--br);background:var(--panel);}
  nav .brand{font-weight:700;margin-right:auto;} a{color:var(--acc);text-decoration:none;}
  main{padding:24px;max-width:1400px;margin:auto;} h1{font-size:22px;margin:0 0 20px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--br);border-radius:10px;overflow:hidden;}
  th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--br);} th{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.8px;}
  .muted{color:var(--mut);} .pos{color:var(--ok);} .neg{color:var(--bad);}
  .venue-paper{color:#86efac;font-weight:600;} .venue-live{color:#fca5a5;font-weight:600;}
  .pill{padding:2px 8px;border-radius:99px;font-size:11px;border:1px solid var(--br);color:var(--mut);}
</style></head><body>
<nav><span class="brand">weather-alpha</span>
  <a href="/">Dashboard</a><a href="/portfolio">Portfolio</a><a href="/history">History</a><a href="/opportunities">Opportunities</a>
</nav>
<main>
  <h1>Trade history</h1>
  <table><thead><tr>
    <th>Opened</th><th>Venue</th><th>Market</th><th>Side</th><th>Size $</th><th>Price</th><th>Status</th><th>PnL</th><th>Reason</th>
  </tr></thead><tbody id="body"><tr><td colspan="9" class="muted">loading…</td></tr></tbody></table>
</main>
<script>
const fmtUsd=v=>(v==null?'—':(v>=0?'$':'-$')+Math.abs(v).toFixed(2));
const sign=v=>v==null?'':v>=0?'pos':'neg';
async function load(){
  const rows=await fetch('/api/history').then(r=>r.json());
  const body=document.getElementById('body');
  body.innerHTML=rows.length?rows.map(r=>`
    <tr>
      <td class="muted">${(r.opened_at||'').slice(0,19)}</td>
      <td class="venue-${r.venue}">${r.venue.toUpperCase()}</td>
      <td>${escape(r.market_id).slice(0,18)}…</td>
      <td>${r.side}</td>
      <td>${(+r.size_usd).toFixed(2)}</td>
      <td>${(+r.price).toFixed(3)}</td>
      <td><span class="pill">${r.status}</span></td>
      <td class="${sign(r.pnl_usd)}">${r.pnl_usd==null?'—':fmtUsd(r.pnl_usd)}</td>
      <td class="muted">${escape(r.reason||'').slice(0,50)}</td>
    </tr>`).join(''):'<tr><td colspan="9" class="muted">no trades yet</td></tr>';
}
function escape(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
load();setInterval(load,30000);
</script>
</body></html>
